<!DOCTYPE html>

<head>

<style>
    html, body {
    margin: 0;
    padding: 0;

    background: #030303;;
}

p {
    margin: 0;
}

.guide {
    color:rgb(255, 255, 255); 
    text-decoration: underline; 
    text-align: center; 
    margin-top: 15px; 
    font-family: 'Google Sans Flex',system-ui; 
    font-weight: 700; 
    cursor: pointer;
}

.guide:hover {
    color:hsl(0, 0%, 66%);
}

/* Links */
.insta {
    color:#DC0000; 
    text-decoration: underline; 
    text-align: center; 
    transform: translateY(40px);
    font-size: 19px;
    font-family: 'Bricolage Grotesque',system-ui; 
    font-weight: 700; 
    cursor: pointer;
}

.insta:hover {
    color: hsl(0, 100%, 33%);
}

.GitHub {
    color:#FFD900; 
    text-decoration: underline; 
    text-align: center; 
    transform: translateY(50px);
    font-family: 'Bricolage Grotesque',system-ui; 
    font-weight: 700;
    font-size: 19px; 
    cursor: pointer;
}

.GitHub:hover {
    color: hsl(51, 100%, 33%);
}

.sup-me {
    color:#00C227; 
    text-decoration: underline; 
    text-align: center; 
    transform: translateY(60px);
    font-size: 19px;
    font-family: 'Bricolage Grotesque',system-ui; 
    font-weight: 700; 
    cursor: pointer;
}

.sup-me:hover {
    color: hsl(130, 61%, 30%);
}

.abme {
    color:#ffffff; 
    text-decoration: underline; 
    text-align: center; 
    transform: translateY(90px);
    font-size: 17px;
    font-family: 'Comfortaa',system-ui; 
    font-weight: light; 
    cursor: pointer;
}

.abme:hover {
    color: hsl(0, 0%, 75%);
}

.thanks {
    color:#ffffff; 
    text-decoration: none; 
    text-align: center; 
    transform: translateY(110px);
    font-size: 14px;
    font-family: 'Host Grotesk',system-ui; 
    font-weight: light;

<body>
    <div class="back-panel">
        <p class="guide">
            <a href="https://guidemonoui.netlify.app" target="_blank" class="guide">Guide how to set “Monoui” as default homepage</a>
        </p>
        <p class="insta">   
            <a href="https://www.instagram.com/monoui.firefox" target="_blank" class="insta">Instagram</a>
        </p>
        <p class="GitHub">
            <a href="https://github.com/markuifoxex" target="_blank" class="GitHub">GitHub(New versions of extension)</a>
        </p>
        <p class="sup-me">
            <a href="https://ko-fi.com/jasonleee" target="_blank" class="sup-me">Support Me</a>
        </p>
        <p class="abme">
            <a href="https://aboutmeandmyprojects.netlify.app" target="_blank" class="abme">About me.</a>
        </p>
        <p class="thanks">
            <a class="thanks">Thanks for choosing us💓</a>
        </p>
